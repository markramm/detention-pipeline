{{ define "main" }}
<div class="page-content">
  <div style="max-width:560px; margin:0 auto; padding:80px 0; text-align:center;">
    <div class="mono dim" style="font-size:64px; font-weight:500; line-height:1; margin-bottom:8px;">404</div>
    <h1 class="serif" style="font-size:24px; font-weight:400; margin-bottom:12px;">Page not found</h1>
    <p style="font-size:14px; color:var(--text-secondary); line-height:1.6; margin-bottom:24px;">
      The page you're looking for doesn't exist or may have moved.
      If you followed a link here, please <a href="https://github.com/markramm/detention-pipeline/issues" style="color:var(--accent-warm);">let us know</a>.
    </p>
    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
      <a href="/" class="btn btn-accent">Go to homepage</a>
      <a href="/map/" class="btn">View the heat map</a>
      <a href="/county/" class="btn">Search counties</a>
    </div>
  </div>
</div>
{{ end }}
