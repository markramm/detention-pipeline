name: "Tip: Building or Warehouse Activity"
description: Report construction, fencing, or conversion activity at a potential detention site
title: "[TIP] Building activity: "
labels: ["tip", "real-estate", "high-priority"]
body:
  - type: markdown
    attributes:
      value: |
        Physical infrastructure changes are hyperlocal and nearly impossible to detect remotely. If you've noticed construction, fencing, security upgrades, or other changes at a large building that might be related to detention, your report helps us track facility development early.

  - type: input
    id: county
    attributes:
      label: County
      description: County name
      placeholder: County name
    validations:
      required: true

  - type: input
    id: state
    attributes:
      label: State
      description: Two-letter state abbreviation
      placeholder: FL
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: Address, intersection, or description of where the building is
      placeholder: "Old Walmart distribution center on Route 9, near the county line"
    validations:
      required: true

  - type: checkboxes
    id: activity_type
    attributes:
      label: What activity have you observed?
      options:
        - label: New fencing or security barriers going up
        - label: Construction or renovation work
        - label: "For sale/lease" signs removed from previously vacant building
        - label: Federal or government vehicles on site
        - label: Building permits filed (if you checked)
        - label: Property recently sold (if you checked records)
        - label: Other unusual activity

  - type: textarea
    id: description
    attributes:
      label: Describe what you've seen
      description: Include dates, what changed, and any signage or vehicles you noticed
      placeholder: "Starting around March 10, I noticed construction crews at the old warehouse. New chain-link fencing with razor wire went up around the perimeter..."
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Supporting links
      description: Links to property records, permits, news articles, or photos (Google Maps, etc.)
      placeholder: https://
