name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.151.2
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install pyyaml pytest

      - name: Run unit tests
        run: python3 -m pytest kb/scripts/tests/ -q

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Generate heat scores
        run: ./build.sh

      - name: Generate Hugo content
        run: |
          cd hugo
          python3 generate_content.py

      - name: Generate visualization data
        # network.json and timeline.json are gitignored (generated), and the
        # network/timeline pages fetch them client-side from the site root.
        # Without this step they 404 on the deployed site and the viz is blank.
        run: |
          cd hugo
          python3 generate_network.py
          python3 scripts/generate_timeline.py
          cp data/timeline.json static/timeline.json

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/Chicago
        run: |
          cd hugo
          hugo \
            --gc \
            --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
