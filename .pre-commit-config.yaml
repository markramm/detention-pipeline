repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/
      - id: end-of-file-fixer
        exclude: ^docs/
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: ^docs/
      - id: check-json
        exclude: ^docs/
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: validate-kb-entries
        name: Validate KB entries
        entry: python3 kb/scripts/validate_entries.py --strict --files
        language: system
        files: ^kb/.*\.md$
        exclude: ^kb/scripts/
        pass_filenames: true
